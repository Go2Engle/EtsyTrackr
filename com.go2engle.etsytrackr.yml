app-id: com.go2engle.etsytrackr
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: etsytrackr
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node18
build-options:
  env:
    FLATPAK_ENABLE_SDK_EXT: 'node18'
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --filesystem=home
  - --share=network
  - --device=dri
modules:
  - name: mesa-libs
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib
      - cp -a /usr/lib/x86_64-linux-gnu/libGL* /app/lib/
    sources:
      - type: file
        only-arches:
          - x86_64
        dest-filename: libGL.so.1
        path: /usr/lib/x86_64-linux-gnu/libGL.so.1

  - name: python3-pip
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app pip
    build-options:
      env:
        PIP_NETWORK_INSTALL_FIX: 'yes'
      network: true

  - name: python3-requirements
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app -r requirements.txt
    sources:
      - type: dir
        path: .
    build-options:
      env:
        PIP_NETWORK_INSTALL_FIX: 'yes'
      network: true

  - name: etsytrackr
    buildsystem: simple
    build-commands:
      - install -D main.py /app/bin/etsytrackr
      - install -D assets/icon.png /app/share/icons/hicolor/256x256/apps/com.go2engle.etsytrackr.png
      - cp -r modules/ /app/lib/python3.11/site-packages/
      - cp -r assets/ /app/share/etsytrackr/
      - install -D com.go2engle.etsytrackr.desktop /app/share/applications/com.go2engle.etsytrackr.desktop
      - install -D com.go2engle.etsytrackr.metainfo.xml /app/share/metainfo/com.go2engle.etsytrackr.metainfo.xml
    sources:
      - type: dir
        path: .
